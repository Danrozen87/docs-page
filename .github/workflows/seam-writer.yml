name: seam-writer

on:
  pull_request:

jobs:
  seam-writer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run SEAM Writer drift check
        run: node --experimental-strip-types ./scripts/seam-writer.ts range "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
